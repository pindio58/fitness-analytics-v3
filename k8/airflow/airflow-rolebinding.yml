apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fitness-analytics-airflow-rolebinding
  namespace: fitness-analytics-namespace
subjects:
  - kind: ServiceAccount
    name: airflow-worker
    namespace: fitness-analytics-namespace
  - kind: ServiceAccount
    name: spark
    namespace: fitness-analytics-namespace
roleRef:
  kind: Role #this must be Role or ClusterRole
  name: fitness-analytics-airflow-role # this must match the name of the Role or ClusterRole you wish to bind to
  apiGroup: rbac.authorization.k8s.io