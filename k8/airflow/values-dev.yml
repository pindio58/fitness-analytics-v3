webserver:
  env:
    - name: BUCKET_NAME
      valueFrom:
        configMapKeyRef:
          name: fitness-analytics-minio-configmap
          key: BUCKET_NAME

    - name: MINIO_ENDPOINT
      valueFrom:
        configMapKeyRef:
          name: fitness-analytics-minio-configmap
          key: MINIO_ENDPOINT
    
    - name: PYTHONPATH
      value: /opt/airflow:/opt/airflow/project

  extraVolumes:
    - name: fitness-analytics-extravolume
      hostPath:
        path: /Users/bhupinderjitsingh/airflwstudy/Projects/fitness-analytics-v2/
        type: Directory
    
  extraVolumeMounts:
    - name: fitness-analytics-extravolume
      mountPath: /opt/airflow/project

