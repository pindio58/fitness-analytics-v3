postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: postgres
    tag: 15.15

dags:
  mountPath: /opt/airflow/dags
  
  persistence:
    annotations: {}
    enabled: true
    existingClaim: fitness-analytics-airflow-pvc
  
  gitSync:
    enabled: false

