postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: postgres
    tag: 15.15

images:
  airflow:
    # registry: docker.io
    pullPolicy: IfNotPresent
    repository: pindio58/fitness-airflow-image
    tag: "2.2"

dags:
  gitSync:
    enabled: true
    repo: https://github.com/pindio58/fitness-analytics-v3.git
    rev: HEAD
    branch: main
    containerLifecycleHooks: {}
    containerName: git-sync
    depth: 1
    subPath: airflow/dags
    wait: 0
    
  persistence:
    enabled: false


webserver:
  env:
    - name: BUCKET_NAME
      valueFrom:
        configMapKeyRef:
          name: fitness-analytics-minio-configmap
          key: BUCKET_NAME

    - name: MINIO_ENDPOINT
      valueFrom:
        configMapKeyRef:
          name: fitness-analytics-minio-configmap
          key: MINIO_ENDPOINT
    

scheduler:
  env:
    - name: BUCKET_NAME
      valueFrom:
        configMapKeyRef:
          name: fitness-analytics-minio-configmap
          key: BUCKET_NAME

    - name: MINIO_ENDPOINT
      valueFrom:
        configMapKeyRef:
          name: fitness-analytics-minio-configmap
          key: MINIO_ENDPOINT

apiServer:
  env:
    - name: BUCKET_NAME
      valueFrom:
        configMapKeyRef:
          name: fitness-analytics-minio-configmap
          key: BUCKET_NAME

    - name: MINIO_ENDPOINT
      valueFrom:
        configMapKeyRef:
          name: fitness-analytics-minio-configmap
          key: MINIO_ENDPOINT

   
workers:
  env:
    - name: BUCKET_NAME
      valueFrom:
        configMapKeyRef:
          name: fitness-analytics-minio-configmap
          key: BUCKET_NAME

    - name: MINIO_ENDPOINT
      valueFrom:
        configMapKeyRef:
          name: fitness-analytics-minio-configmap
          key: MINIO_ENDPOINT


#  for following, please refer https://www.notion.so/Could-not-read-served-logs-Invalid-URL-http-8793-log-dag_id-No-host-supplied-2d5e0b22664f80598880f22e3a0e2474?v=2c2e0b22664f8095acf9000cdc510362&source=copy_link 
webserverSecretKeySecretName: fitness-analytics-airflow-secret
config:
  core:
    hostname_callable: airflow.utils.net.get_host_ip_address
  logging:
    hostname_callable: airflow.utils.net.get_host_ip_address
  api:
    hostname_callable: airflow.utils.net.get_host_ip_address


# https://www.notion.so/rest-db-on-every-Airflow-restart-311e0b22664f80518723fdc146fabd00?source=copy_link
migrateDatabaseJob:
  enabled: true
