apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fitness-analytics-airflow-role
  namespace: fitness-analytics-namespace
rules:
  # SparkApplication CRD
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications", "sparkapplications/status"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  # Pods & Services for driver/executor
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "persistentvolumeclaims","configmaps", "secrets"]
    verbs: ["create", "get", "list", "watch", "delete", "deletecollection", "update", "patch"]