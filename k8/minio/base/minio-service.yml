apiVersion: v1
kind: Service
metadata:
  name: fitness-analytics-minio-service
  namespace: fitness-analytics-namespace
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  clusterIP: None
